name: Deploy Astro to DonDominio via FTP

on:
  push:
    branches:
      - main
      - master

  repository_dispatch:
    types: [wordpress-publish]

jobs:
  build-and-deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm install

    - name: Build Astro portfolio
      run: npm run build
      env:
        WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}

    - name: Deploy via FTP to DonDominio
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: /
